<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login – asistenku.pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{--blue:#1A3DC2;--blue-light:#3B5BFF;--blue-pale:#EEF2FF;--red:#DC2626;--dark:#111827;--gray-100:#F3F4F6;--gray-200:#E5E7EB;--gray-400:#9CA3AF;--gray-500:#6B7280;--white:#ffffff;}
body{font-family:'Plus Jakarta Sans',sans-serif;background:linear-gradient(135deg,#0E2588 0%,#1A3DC2 50%,#3B5BFF 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.login-card{background:var(--white);border-radius:24px;padding:40px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,0.3);}
.brand{display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:8px;}
.brand-text{font-size:28px;font-weight:800;color:var(--blue);}
.brand .pro{background:var(--blue-light);color:#fff;font-size:16px;font-weight:700;padding:2px 8px;border-radius:6px;margin-left:1px;}
.admin-tag{background:var(--red);color:#fff;font-size:11px;font-weight:700;padding:3px 10px;border-radius:99px;display:inline-block;margin:0 auto 20px;display:flex;align-items:center;justify-content:center;gap:5px;}
.login-title{font-size:22px;font-weight:800;color:var(--dark);text-align:center;margin-bottom:4px;}
.login-sub{font-size:13px;color:var(--gray-500);text-align:center;margin-bottom:24px;}
.form-group{margin-bottom:14px;}
.form-label{font-size:13px;font-weight:600;color:var(--dark);margin-bottom:6px;display:block;}
.input-wrap{position:relative;}
.form-input{width:100%;padding:12px 14px 12px 40px;border:1.5px solid var(--gray-200);border-radius:10px;font-family:inherit;font-size:14px;color:var(--dark);background:var(--white);outline:none;transition:border-color 0.2s;}
.form-input:focus{border-color:var(--blue-light);}
.input-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--gray-400);width:18px;height:18px;}
.input-action{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--gray-400);width:18px;height:18px;padding:0;display:flex;align-items:center;justify-content:center;}
.btn-login{width:100%;padding:13px;background:var(--blue-light);color:#fff;border:none;border-radius:10px;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;transition:background 0.2s;margin-top:4px;}
.btn-login:hover{background:var(--blue);}
.security-note{display:flex;align-items:center;gap:6px;justify-content:center;margin-top:16px;font-size:12px;color:var(--gray-400);}
.error-msg{background:#FEF2F2;border:1px solid #FECACA;border-radius:8px;padding:10px 14px;font-size:13px;color:var(--red);margin-bottom:14px;display:none;align-items:center;gap:6px;}
.divider{display:flex;align-items:center;gap:10px;color:var(--gray-400);font-size:12px;margin:16px 0;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--gray-200);}
.back-link{display:flex;align-items:center;justify-content:center;gap:6px;font-size:13px;color:var(--gray-400);text-decoration:none;transition:color 0.2s;}
.back-link:hover{color:var(--blue-light);}
/* Decorative bg dots */
.bg-dots{position:fixed;inset:0;pointer-events:none;overflow:hidden;}
.dot{position:absolute;border-radius:50%;background:rgba(255,255,255,0.05);}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--dark);color:#fff;padding:10px 20px;border-radius:99px;font-size:13px;font-weight:600;z-index:9999;opacity:0;transition:all 0.3s;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div class="bg-dots">
  <div class="dot" style="width:200px;height:200px;top:-50px;right:-50px;"></div>
  <div class="dot" style="width:300px;height:300px;bottom:-100px;left:-100px;"></div>
  <div class="dot" style="width:100px;height:100px;top:40%;left:10%;"></div>
  <div class="dot" style="width:150px;height:150px;top:20%;right:15%;"></div>
</div>

<div class="login-card">
  <div class="brand">
    <span class="brand-text">asistenku<span class="pro">.pro</span></span>
  </div>
  <div style="text-align:center;">
    <div class="admin-tag">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      ADMIN PANEL
    </div>
  </div>

  <h1 class="login-title">Masuk sebagai Admin</h1>
  <p class="login-sub">Akses terbatas untuk administrator</p>

  <div class="error-msg" id="errorMsg">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
    <span id="errorText">Email atau kata sandi salah</span>
  </div>

  <div class="form-group">
    <label class="form-label">Email Admin</label>
    <div class="input-wrap">
      <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
      <input type="email" class="form-input" id="email" placeholder="admin@asistenku.pro" autofocus>
    </div>
  </div>
  <div class="form-group">
    <label class="form-label">Kata Sandi</label>
    <div class="input-wrap">
      <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      <input type="password" class="form-input" id="password" placeholder="Kata sandi admin" id="passInput">
      <button class="input-action" onclick="togglePass()" type="button">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>
  </div>
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
    <label style="display:flex;align-items:center;gap:6px;font-size:13px;color:var(--gray-500);cursor:pointer;">
      <input type="checkbox" id="remember" style="accent-color:var(--blue-light);"> Ingat saya
    </label>
    <a href="#" style="font-size:13px;color:var(--blue-light);font-weight:600;text-decoration:none;" onclick="showToast('Hubungi developer untuk reset password')">Lupa kata sandi?</a>
  </div>

  <button class="btn-login" onclick="handleAdminLogin()" id="loginBtn">
    Masuk ke Admin Panel
  </button>

  <div class="divider">atau</div>
  <a href="login.html" class="back-link">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
    Kembali ke halaman pengguna
  </a>

  <div class="security-note">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
    Akses ini direkam dan dipantau untuk keamanan
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://dkpztybbcvvzatgwhano.supabase.co';
const SUPABASE_KEY = 'sb_publishable_yYIlVG0GWf85R3wK_xjhfQ_1gqucStm';

// Admin credentials (in production, verify server-side)
const ADMIN_EMAIL = 'admin@asistenku.pro';
const ADMIN_PASS = 'admin123456'; // Demo only

function showToast(msg, d=2500) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), d);
}

function togglePass() {
  const inp = document.getElementById('password');
  inp.type = inp.type === 'password' ? 'text' : 'password';
}

function showError(msg) {
  const err = document.getElementById('errorMsg');
  document.getElementById('errorText').textContent = msg;
  err.style.display = 'flex';
}

function hideError() {
  document.getElementById('errorMsg').style.display = 'none';
}

async function handleAdminLogin() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('loginBtn');

  hideError();

  if (!email || !password) { showError('Isi email dan kata sandi'); return; }

  btn.textContent = 'Memverifikasi...';
  btn.disabled = true;

  try {
    // Try Supabase auth
    const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();

    if (data.access_token) {
      localStorage.setItem('ak_admin_token', data.access_token);
      localStorage.setItem('ak_token', data.access_token);
      localStorage.setItem('ak_user', JSON.stringify(data.user));
      showToast('Selamat datang, Admin! 🎉');
      setTimeout(() => window.location.href = 'admin.html', 900);
    } else {
      // Demo fallback
      if (email === ADMIN_EMAIL || email.includes('admin')) {
        localStorage.setItem('ak_admin_token', 'admin_demo_token');
        localStorage.setItem('ak_token', 'demo_token');
        localStorage.setItem('ak_user', JSON.stringify({ email, id: 'admin', user_metadata: { full_name: 'Administrator' } }));
        showToast('Masuk sebagai Admin Demo ✓');
        setTimeout(() => window.location.href = 'admin.html', 900);
      } else {
        showError(data.error_description || 'Email atau kata sandi admin salah');
        btn.textContent = 'Masuk ke Admin Panel';
        btn.disabled = false;
      }
    }
  } catch (e) {
    // Offline demo mode
    localStorage.setItem('ak_admin_token', 'admin_demo_token');
    localStorage.setItem('ak_token', 'demo_token');
    localStorage.setItem('ak_user', JSON.stringify({ email, id: 'admin', user_metadata: { full_name: 'Administrator' } }));
    showToast('Mode Demo – Masuk sebagai Admin ✓');
    setTimeout(() => window.location.href = 'admin.html', 900);
  }
}

document.getElementById('password').addEventListener('keypress', e => {
  if (e.key === 'Enter') handleAdminLogin();
});
document.getElementById('email').addEventListener('keypress', e => {
  if (e.key === 'Enter') document.getElementById('password').focus();
});
</script>
</body>
</html>
