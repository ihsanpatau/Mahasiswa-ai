<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#1A3DC2">
<meta name="description" content="asistenku.pro – Asisten AI pintar untuk tugas akademik dan profesional">
<title>asistenku.pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
/* ── Splash-specific overrides ── */
.splash {
  width: 100%; max-width: 430px; min-height: 100vh; min-height: 100dvh;
  background: #fff; display: flex; flex-direction: column;
  align-items: center; position: relative; overflow: hidden;
}

/* Top area */
.splash-top {
  width: 100%; padding: 64px 28px 0;
  display: flex; flex-direction: column; align-items: center; gap: 12px;
  z-index: 2; position: relative;
}
.splash-logo {
  display: flex; align-items: center;
  font-size: 34px; font-weight: 800; color: #1A3DC2; letter-spacing: -1px;
}
.splash-logo-pro {
  background: #3B5BFF; color: #fff;
  font-size: 21px; font-weight: 700;
  padding: 2px 10px; border-radius: 9px; margin-left: 1px;
}
.splash-tagline {
  font-size: 16px; color: #6B7280; text-align: center;
  line-height: 1.5; max-width: 280px;
}

/* Wave background */
.wave-bg {
  position: absolute;
  bottom: 230px; left: 0; right: 0; height: 340px;
  background: linear-gradient(180deg, #EEF2FF 0%, #C7D5FF 100%);
  border-radius: 58% 58% 0 0 / 38% 38% 0 0;
  z-index: 1;
}

/* Mascot */
.splash-mascot {
  width: 100%; max-width: 340px;
  position: relative; z-index: 2; margin-top: 6px;
  display: flex; justify-content: center;
}

/* Sparkles */
.sparkle {
  position: absolute; border-radius: 50%; z-index: 3;
  animation: sparklePulse 3s ease-in-out infinite alternate;
}
@keyframes sparklePulse {
  0%   { transform: scale(1) rotate(0deg); opacity: .5; }
  100% { transform: scale(1.3) rotate(30deg); opacity: .9; }
}
/* 4-point star shape */
.star {
  position: absolute; z-index: 3;
  animation: starFloat 2.5s ease-in-out infinite alternate;
}
@keyframes starFloat {
  0%   { transform: translateY(0) scale(1); opacity: .6; }
  100% { transform: translateY(-10px) scale(1.1); opacity: 1; }
}

/* Features bar */
.features-bar {
  background: #fff; border-radius: 20px 20px 0 0;
  width: 100%; padding: 20px 18px 0;
  z-index: 3; box-shadow: 0 -6px 28px rgba(27,61,194,.07);
}
.features-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; }
.feat-item { display: flex; flex-direction: column; align-items: center; gap: 5px; text-align: center; }
.feat-icon {
  width: 46px; height: 46px; background: #EEF2FF; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
}
.feat-icon svg { width: 22px; height: 22px; color: #1A3DC2; }
.feat-label { font-size: 12px; font-weight: 700; color: #1A3DC2; }
.feat-desc  { font-size: 10px; color: #6B7280; line-height: 1.3; }

/* Loading bar area */
.splash-footer {
  background: #1A3DC2; width: 100%;
  padding: 20px 32px 40px;
  display: flex; flex-direction: column; align-items: center; gap: 12px;
  z-index: 3;
}
.loading-text { color: #fff; font-size: 14px; font-weight: 500; }
.loading-track {
  width: 100%; max-width: 260px; height: 6px;
  background: rgba(255,255,255,.25); border-radius: 99px; overflow: hidden;
}
.loading-fill {
  height: 100%; width: 0%; background: #fff; border-radius: 99px;
  transition: width .4s ease;
}
.start-btn {
  display: none;
  width: 100%; max-width: 260px; padding: 14px;
  background: #fff; color: #1A3DC2;
  font-family: inherit; font-size: 16px; font-weight: 700;
  border: none; border-radius: 14px; cursor: pointer;
  transition: transform .1s;
}
.start-btn:hover { transform: scale(1.02); }
.start-btn:active { transform: scale(.98); }
</style>
</head>
<body>
<div class="splash">

    <svg width="14" height="14" viewBox="0 0 24 24" fill="#3B5BFF" opacity=".7"><path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6z"/></svg>

</svg>

  <!-- Features -->

  <!-- Loading footer -->
  <div class="splash-footer">
    <p class="loading-text" id="loadText">Menyiapkan pengalaman terbaik untukmu...</p>
    <div class="loading-track">
      <div class="loading-fill" id="loadFill"></div>
    </div>
    <button class="start-btn" id="startBtn" onclick="location.href='login.html'">
      Mulai Sekarang →
    </button>

</div>

<script>
// Animate loading bar
const fill = document.getElementById('loadFill');
const text = document.getElementById('loadText');
const btn  = document.getElementById('startBtn');

let pct = 0;
const interval = setInterval(() => {
  pct = Math.min(pct + (Math.random() * 18 + 8), 100);
  fill.style.width = pct + '%';
  if (pct >= 100) {
    clearInterval(interval);
    text.textContent = 'Siap! Selamat datang 🎓';
    btn.style.display = 'block';
    // Auto-redirect after 3.5s
    setTimeout(() => location.href = 'login.html', 3500);
  }
}, 200);
</script>
</body>
</html>
