<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tanya Jawab & Koreksi – asistenku.pro</title>
<link rel="stylesheet" href="style.css">
<style>
.app{display:flex;flex-direction:column;height:100vh;}
.chat-area{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:10px;}
.mode-tabs{display:flex;gap:0;border-bottom:2px solid var(--gray-200);}
.mode-tab{flex:1;padding:10px;border:none;background:none;font-family:inherit;font-size:13px;font-weight:600;color:var(--gray-400);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;}
.mode-tab.active{color:var(--blue-light);border-bottom-color:var(--blue-light);}
.correction-area{padding:16px;flex:1;overflow-y:auto;}
.diff-old{background:#FEE2E2;text-decoration:line-through;border-radius:3px;padding:0 2px;color:#991B1B;}
.diff-new{background:#DCFCE7;border-radius:3px;padding:0 2px;color:#166534;font-weight:600;}
</style>
</head>
<body>
<div class="app">
  <div class="backnav">
    <div class="backnav-left">
      <button class="back-btn" onclick="history.back()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#374151" stroke-width="2.5"><path d="m15 18-6-6 6-6"/></svg></button>
      <div><div class="backnav-title">Tanya Jawab & Koreksi</div><div class="backnav-sub">AI akademik & cek tata bahasa</div></div>
    </div>
  </div>

  <!-- Mode Tabs -->
  <div class="mode-tabs">
    <button class="mode-tab active" id="tabQA" onclick="switchMode('qa')">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:4px;"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      Tanya Jawab
    </button>
    <button class="mode-tab" id="tabKoreksi" onclick="switchMode('koreksi')">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:4px;"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
      Koreksi Tata Bahasa
    </button>
  </div>

  <!-- QA Mode -->
  <div id="qaMode" style="display:flex;flex-direction:column;flex:1;overflow:hidden;">
    <div class="chat-area" id="qaChat">
      <div style="text-align:center;padding:20px;">
        <div style="font-size:32px;margin-bottom:8px;">🎓</div>
        <div style="font-size:15px;font-weight:700;color:var(--dark);">Tanya Apa Saja!</div>
        <p style="font-size:12px;color:var(--gray-500);margin-top:4px;">Pertanyaan akademik, metodologi, penulisan, atau apapun seputar skripsi dan penelitian.</p>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;justify-content:center;">
        <button onclick="sendQuick('Bagaimana cara menulis latar belakang yang baik?')" class="quick-reply">Cara menulis latar belakang</button>
        <button onclick="sendQuick('Apa perbedaan penelitian kualitatif dan kuantitatif?')" class="quick-reply">Kualitatif vs Kuantitatif</button>
        <button onclick="sendQuick('Bagaimana cara menentukan sampel penelitian?')" class="quick-reply">Cara menentukan sampel</button>
        <button onclick="sendQuick('Apa itu uji validitas dan reliabilitas?')" class="quick-reply">Validitas & reliabilitas</button>
      </div>
    </div>
    <div class="chat-input-area">
      <div class="chat-input-row">
        <textarea class="chat-input" id="qaInput" placeholder="Tanya seputar akademik & penelitian..." rows="1"
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendQA();}"
          oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
        <button class="send-btn" style="background:var(--blue-light);" onclick="sendQA()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Koreksi Mode -->
  <div id="koreksiMode" style="display:none;flex:1;overflow:hidden;display:flex;flex-direction:column;">
    <div class="correction-area" id="koreksiContent">
      <div class="form-group">
        <label class="form-label">Teks yang Ingin Dikoreksi <span style="color:var(--red)">*</span></label>
        <textarea class="form-textarea" id="koreksiInput" placeholder="Tempel paragraf atau kalimat yang ingin dicek tata bahasanya..." rows="6"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Jenis Koreksi</label>
        <div class="type-pills">
          <button class="type-pill active" onclick="selectPill(this)">Tata Bahasa</button>
          <button class="type-pill" onclick="selectPill(this)">EYD & Ejaan</button>
          <button class="type-pill" onclick="selectPill(this)">Gaya Akademik</button>
          <button class="type-pill" onclick="selectPill(this)">Semua</button>
        </div>
      </div>
      <button class="btn btn-primary" onclick="doKoreksi()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
        Koreksi Sekarang
      </button>
      <div id="koreksiResult" style="display:none;margin-top:16px;">
        <div style="font-size:14px;font-weight:700;color:var(--dark);margin-bottom:8px;">Hasil Koreksi:</div>
        <div style="background:var(--white);border:1px solid var(--gray-200);border-radius:12px;padding:14px;margin-bottom:10px;">
          <div id="koreksiText" style="font-size:13px;line-height:1.8;"></div>
        </div>
        <div style="background:var(--white);border:1px solid var(--gray-200);border-radius:12px;padding:14px;">
          <div style="font-size:13px;font-weight:700;color:var(--dark);margin-bottom:8px;">Penjelasan Koreksi:</div>
          <div id="koreksiExplain" style="font-size:12px;color:var(--gray-700);line-height:1.6;"></div>
        </div>
        <div style="display:flex;gap:8px;margin-top:10px;">
          <button class="btn btn-secondary btn-sm" onclick="copyKoreksi()">Salin Hasil</button>
          <button class="btn btn-primary btn-sm" onclick="document.getElementById('koreksiResult').style.display='none'">Koreksi Lagi</button>
        </div>
      </div>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="beranda.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg><span class="nav-label">Beranda</span></a>
    <a href="mahasiswa.html" class="nav-item active"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3L1 9l4 2.18v6L12 21l7-3.82v-6L23 9z"/></svg><span class="nav-label">Mahasiswa</span></a>
    <a href="tugas.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/></svg><span class="nav-label">Tugas</span></a>
    <a href="doktrai.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span class="nav-label">DoktrAI</span></a>
    <a href="profil.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span class="nav-label">Profil</span></a>
  </nav>
</div>
<div class="toast" id="toast"></div>
<script>
function showToast(msg,d=2500){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),d);}
function selectPill(btn){btn.closest('.type-pills').querySelectorAll('.type-pill').forEach(p=>p.classList.remove('active'));btn.classList.add('active');}
if(!localStorage.getItem('ak_token')){window.location.href='login.html';}

function switchMode(mode){
  document.getElementById('qaMode').style.display=mode==='qa'?'flex':'none';
  document.getElementById('koreksiMode').style.display=mode==='koreksi'?'flex':'none';
  document.getElementById('tabQA').classList.toggle('active',mode==='qa');
  document.getElementById('tabKoreksi').classList.toggle('active',mode==='koreksi');
}

let qaChatHistory=[];
function addMsg(role,text){
  const area=document.getElementById('qaChat');
  const now=new Date();
  const time=now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');
  if(role==='user'){
    area.innerHTML+=`<div class="chat-msg user"><div><div class="chat-bubble">${text.replace(/\n/g,'<br>')}</div><div class="chat-time">${time} ✓✓</div></div></div>`;
    qaChatHistory.push({role:'user',content:text});
  } else {
    area.innerHTML+=`<div class="chat-msg bot"><div class="chat-avatar" style="width:30px;height:30px;border-radius:50%;background:var(--blue-pale);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;">🎓</div><div><div class="chat-bubble">${text.replace(/\n\n/g,'<br><br>').replace(/\n/g,'<br>').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')}</div><div class="chat-time">${time}</div></div></div>`;
    qaChatHistory.push({role:'assistant',content:text});
  }
  area.scrollTop=area.scrollHeight;
}
function showTypingQA(){
  const area=document.getElementById('qaChat');
  area.innerHTML+=`<div class="chat-msg bot" id="typingQA"><div style="width:30px;height:30px;border-radius:50%;background:var(--blue-pale);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;">🎓</div><div class="chat-bubble" style="background:var(--white);border:1px solid var(--gray-200);"><div style="display:flex;gap:4px;align-items:center;padding:4px;"><div style="width:7px;height:7px;background:var(--gray-400);border-radius:50%;animation:typingBounce 1.2s ease-in-out infinite;"></div><div style="width:7px;height:7px;background:var(--gray-400);border-radius:50%;animation:typingBounce 1.2s ease-in-out infinite 0.2s;"></div><div style="width:7px;height:7px;background:var(--gray-400);border-radius:50%;animation:typingBounce 1.2s ease-in-out infinite 0.4s;"></div></div></div></div>`;
  area.scrollTop=area.scrollHeight;
}
async function sendQA(){
  const inp=document.getElementById('qaInput');
  const msg=inp.value.trim();
  if(!msg)return;
  inp.value='';inp.style.height='auto';
  addMsg('user',msg);
  showTypingQA();
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1000,system:'Kamu adalah asisten akademik AI dari asistenku.pro. Jawab pertanyaan seputar skripsi, tesis, penelitian, metodologi, dan penulisan akademik dalam Bahasa Indonesia. Jawab dengan jelas, terstruktur, dan berikan contoh praktis jika perlu.',messages:qaChatHistory})});
    const data=await res.json();
    document.getElementById('typingQA')?.remove();
    const reply=data.content?.[0]?.text||'Maaf, terjadi kesalahan.';
    addMsg('bot',reply);
  }catch(e){document.getElementById('typingQA')?.remove();addMsg('bot','Gagal terhubung ke AI. Periksa koneksi internet Anda.');}
}
function sendQuick(msg){document.getElementById('qaInput').value=msg;sendQA();}
async function doKoreksi(){
  const text=document.getElementById('koreksiInput').value.trim();
  if(!text){showToast('Masukkan teks yang ingin dikoreksi');return;}
  const jenis=document.querySelector('.type-pills .type-pill.active')?.textContent||'Tata Bahasa';
  showToast('Menganalisis teks...');
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1000,messages:[{role:'user',content:`Koreksi teks berikut untuk ${jenis} dalam Bahasa Indonesia. Berikan:\n1. Teks yang sudah dikoreksi (tandai perubahan dengan [SEBELUM→SESUDAH])\n2. Penjelasan singkat setiap koreksi\n\nTeks: "${text}"`}]})});
    const data=await res.json();
    const result=data.content?.[0]?.text||'';
    const parts=result.split(/\d\.\s+(?:Teks|Penjelasan)/i);
    document.getElementById('koreksiText').innerHTML=(parts[1]||result).trim().replace(/\[(.*?)→(.*?)\]/g,'<span class="diff-old">$1</span> <span class="diff-new">$2</span>').replace(/\n/g,'<br>');
    document.getElementById('koreksiExplain').innerHTML=(parts[2]||'Silakan periksa hasil koreksi di atas.').trim().replace(/\n/g,'<br>');
    document.getElementById('koreksiResult').style.display='block';
    document.getElementById('koreksiResult').scrollIntoView({behavior:'smooth'});
    showToast('Koreksi selesai! ✓');
  }catch(e){showToast('Gagal. Coba lagi.');}
}
function copyKoreksi(){navigator.clipboard.writeText(document.getElementById('koreksiText').innerText).then(()=>showToast('Disalin!'));}
</script>
<style>@keyframes typingBounce{0%,80%,100%{transform:scale(0.7);opacity:0.5}40%{transform:scale(1);opacity:1}}</style>
</body>
</html>
