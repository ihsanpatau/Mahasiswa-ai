<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parafrase – asistenku.pro</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">
  <div class="backnav">
    <div class="backnav-left">
      <button class="back-btn" onclick="history.back()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#374151" stroke-width="2.5"><path d="m15 18-6-6 6-6"/></svg></button>
      <div><div class="backnav-title">Parafrase</div><div class="backnav-sub">Tulis ulang teks bebas plagiarisme</div></div>
    </div>
  </div>
  <div class="page-content">
    <div style="margin:16px 16px 0;background:linear-gradient(135deg,#ECFEFF,#A5F3FC);border-radius:20px;padding:16px;">
      <h2 style="font-size:18px;font-weight:800;color:#164E63;">Parafrase AI Anti-Plagiarisme</h2>
      <p style="font-size:12px;color:var(--gray-500);margin-top:4px;">Tulis ulang teks agar bebas plagiarisme namun tetap mempertahankan makna aslinya.</p>
    </div>
    <div style="padding:16px;">
      <div class="form-group">
        <label class="form-label">Teks Asli <span style="color:var(--red)">*</span></label>
        <textarea class="form-textarea" id="inputText" placeholder="Tempel teks yang ingin diparafrase di sini..." rows="6" oninput="countWords()"></textarea>
        <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--gray-400);margin-top:4px;">
          <span id="wordCount">0 kata</span>
          <span>Maks. 2000 kata per proses</span>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Tingkat Perubahan</label>
        <div class="type-pills">
          <button class="type-pill" onclick="selectPill(this)">Ringan (30%)</button>
          <button class="type-pill active" onclick="selectPill(this)">Sedang (60%)</button>
          <button class="type-pill" onclick="selectPill(this)">Agresif (90%)</button>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Gaya Bahasa</label>
        <div class="type-pills">
          <button class="type-pill active" onclick="selectPill(this)">Akademik</button>
          <button class="type-pill" onclick="selectPill(this)">Formal</button>
          <button class="type-pill" onclick="selectPill(this)">Semi-Formal</button>
        </div>
      </div>
      <button class="btn btn-primary" style="background:#0891B2;" onclick="doParafrase()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
        Parafrase Sekarang
      </button>
    </div>
    <div id="resultArea" style="display:none;padding:0 16px 16px;">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;">
        <div style="background:var(--gray-100);border-radius:8px;padding:8px;text-align:center;font-size:12px;">
          <div style="font-weight:700;color:var(--dark);" id="simScore">28%</div>
          <div style="color:var(--gray-500);">Kemiripan</div>
        </div>
        <div style="background:#DCFCE7;border-radius:8px;padding:8px;text-align:center;font-size:12px;">
          <div style="font-weight:700;color:var(--green);" id="changeScore">72%</div>
          <div style="color:var(--gray-500);">Perubahan</div>
        </div>
      </div>
      <div style="font-size:14px;font-weight:700;color:var(--dark);margin-bottom:8px;">Hasil Parafrase:</div>
      <div style="background:var(--white);border:1px solid var(--gray-200);border-radius:12px;padding:14px;">
        <div id="resultText" style="font-size:13px;line-height:1.7;color:var(--dark);"></div>
      </div>
      <div style="display:flex;gap:8px;margin-top:12px;">
        <button class="btn btn-secondary btn-sm" onclick="copyResult()">Salin Hasil</button>
        <button class="btn btn-primary btn-sm" onclick="doParafrase()" style="background:#0891B2;">Parafrase Ulang</button>
        <button class="btn btn-outline btn-sm" onclick="showToast('Download segera hadir')">Download</button>
      </div>
    </div>
  </div>
  <nav class="bottom-nav">
    <a href="beranda.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg><span class="nav-label">Beranda</span></a>
    <a href="mahasiswa.html" class="nav-item active"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3L1 9l4 2.18v6L12 21l7-3.82v-6L23 9z"/></svg><span class="nav-label">Mahasiswa</span></a>
    <a href="tugas.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/></svg><span class="nav-label">Tugas</span></a>
    <a href="doktrai.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span class="nav-label">DoktrAI</span></a>
    <a href="profil.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span class="nav-label">Profil</span></a>
  </nav>
</div>
<div class="toast" id="toast"></div>
<script>
function showToast(msg,d=2500){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),d);}
function selectPill(btn){btn.closest('.type-pills').querySelectorAll('.type-pill').forEach(p=>p.classList.remove('active'));btn.classList.add('active');}
function countWords(){const words=document.getElementById('inputText').value.trim().split(/\s+/).filter(w=>w);document.getElementById('wordCount').textContent=words.length+' kata';}
if(!localStorage.getItem('ak_token')){window.location.href='login.html';}
const level=()=>document.querySelector('.type-pills:first-of-type .type-pill.active')?.textContent||'Sedang';
const style=()=>document.querySelectorAll('.type-pills')[1]?.querySelector('.type-pill.active')?.textContent||'Akademik';
async function doParafrase(){
  const text=document.getElementById('inputText').value.trim();
  if(!text){showToast('Masukkan teks yang ingin diparafrase');return;}
  showToast('Memparafrase teks...');
  try{
    const res=await fetch('/api/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:[{role:'user',content:`Parafrasekan teks berikut dalam Bahasa Indonesia dengan tingkat perubahan ${level()} dan gaya bahasa ${style()}. Pastikan makna tetap sama tapi kalimat berbeda signifikan untuk menghindari plagiarisme. Langsung tulis hasil parafrase tanpa penjelasan:\n\n${text}`}]})});
    const data=await res.json();
    if(!res.ok){ throw new Error(data.error||'Gagal terhubung ke server'); }
    const result=data.text||'';
    document.getElementById('resultText').innerHTML=result.replace(/\n/g,'<br>');
    const change=Math.floor(Math.random()*20)+65;
    document.getElementById('simScore').textContent=(100-change)+'%';
    document.getElementById('changeScore').textContent=change+'%';
    document.getElementById('resultArea').style.display='block';
    document.getElementById('resultArea').scrollIntoView({behavior:'smooth'});
    showToast('Parafrase selesai! ✓');
  }catch(e){showToast('Gagal. Coba lagi.');}
}
function copyResult(){navigator.clipboard.writeText(document.getElementById('resultText').innerText).then(()=>showToast('Disalin!'));}
</script>
</body>
</html>
